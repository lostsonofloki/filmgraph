name: Vercel Error Investigation

on:
  workflow_dispatch:
  schedule:
    # 07:00 CDT (UTC-5) == 12:00 UTC while daylight saving is active.
    - cron: "0 12 * * *"

permissions:
  contents: write
  issues: write

jobs:
  investigate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Investigate Vercel deployment errors
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          REPORT_PATH: artifacts/vercel-error-report.md
          TOP_N: "10"
          LOOKBACK_HOURS: "24"
        run: node scripts/investigate-vercel-errors.mjs

      - name: Append report to workflow summary
        if: always()
        run: |
          if [ -f artifacts/vercel-error-report.md ]; then
            cat artifacts/vercel-error-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No report generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vercel-error-report
          path: artifacts/vercel-error-report.md
          if-no-files-found: warn

      - name: Create investigation issue
        if: always()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: Vercel Error Investigation - ${{ github.run_id }}
          content-filepath: artifacts/vercel-error-report.md
          labels: |
            incident
            vercel
            automation
